version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: textinsight
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

api:
  build: .
  container_name: fastapi_app
  ports:
    - "8000:8000"
  environment:
    DATABASE_URL: postgresql://postgres:postgres@db:5432/textinsight
  depends_on:
    - db
  volumes:
    - .:/app
  networks:
    - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
